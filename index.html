<!doctype html>
<html>

        <style>
            @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap");

            body {
                margin: 0;
                font-family: "Nunito", Arial, sans-serif;
                background: #f0f0f0;
                color: #333;
            }

            #modernModal {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: min(340px, calc(100vw - 32px));
                background: #fff;
                border-radius: 20px;
                padding: clamp(20px, 5vw, 28px) clamp(16px, 5vw, 24px);
                text-align: center;
                z-index: 9999;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.13);
                box-sizing: border-box;
            }

            .modal-icon-wrap {
                background: #fff5f5;
                width: clamp(54px, 15vw, 68px);
                height: clamp(54px, 15vw, 68px);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 12px;
            }

            .modal-icon-wrap img {
                width: clamp(34px, 10vw, 44px);
            }

            .modal-badge {
                display: inline-block;
                background: #fff0f0;
                color: #dc1f2e;
                font-size: clamp(10px, 2.8vw, 12px);
                font-weight: 700;
                letter-spacing: 0.5px;
                border-radius: 20px;
                padding: 4px 14px;
                margin-bottom: 10px;
                text-transform: uppercase;
            }

            h2 {
                color: #1a1a1a;
                font-size: clamp(17px, 4.5vw, 20px);
                font-weight: 800;
                margin: 0 0 8px;
            }

            p {
                font-size: clamp(13px, 3.5vw, 14px);
                color: #555;
                line-height: 1.5;
                margin: 0 0 6px;
            }

            .modal-divider {
                border: none;
                border-top: 1px solid #f0f0f0;
                margin: 14px 0;
            }

            .modal-btn {
                margin-top: 4px;
                padding: clamp(12px, 3.5vw, 14px);
                width: 100%;
                border: none;
                border-radius: 12px;
                font-size: clamp(15px, 4vw, 16px);
                font-weight: 800;
                font-family: "Nunito", Arial, sans-serif;
                background: linear-gradient(90deg, #e8292a, #ff6b35);
                color: #fff;
                cursor: pointer;
                letter-spacing: 0.3px;
                transition: opacity 0.2s;
                touch-action: manipulation;
            }

            .modal-btn:hover {
                opacity: 0.92;
            }

            .modal-btn:active {
                opacity: 0.85;
                transform: scale(0.98);
            }

            .modal-footer {
                margin-top: 12px;
                font-size: clamp(10px, 2.5vw, 11px);
                color: #bbb;
            }

            .cubre {
                width: 100%;
                height: 100vh;
            }
        </style>
        <title>Estamos Cargando una Oferta para ti...</title>
    </head>
    <body>
        <div class="cubre" onclick="redirectToOffer()">
            <div id="modernModal">
                <div class="modal-icon-wrap">
                    <img
                        src="https://scale.com.co/wp-content/uploads/2025/06/notificacion.png"
                    />
                </div>
                <span class="modal-badge">Solo hoy · Oferta limitada</span>
                <h2>Descuento especial para Colombia</h2>
                <p>
                    Continua y no pierdas esta promo
                    <b>precio exclusivo</b> en este producto.
                </p>
                <hr class="modal-divider" />
                <button class="modal-btn">Ver mi descuento →</button>
                <p class="modal-footer">
                    Oferta válida hasta agotar existencias
                </p>
            </div>
        </div>
        <script>
            const offerUrl = "https://innokomarket.com/products/bafle-4-nuevo";
            function redirectToOffer() {
                if (typeof ttq !== "undefined") {
                    ttq.track("ClickButton");
                }
                window.location.href = offerUrl;
            }
        </script>
    </body>
</html>
