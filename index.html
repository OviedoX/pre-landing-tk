<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="google" value="notranslate" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- TikTok Pixel Code -->
        <script>
            !(function (w, d, t) {
                w.TiktokAnalyticsObject = t;
                var ttq = (w[t] = w[t] || []);
                ttq.methods = [
                    "page",
                    "track",
                    "identify",
                    "instances",
                    "debug",
                    "on",
                    "off",
                    "once",
                    "ready",
                    "alias",
                    "group",
                    "enableCookie",
                    "disableCookie",
                ];
                ttq.setAndDefer = function (t, e) {
                    t[e] = function () {
                        t.push(
                            [e].concat(
                                Array.prototype.slice.call(arguments, 0),
                            ),
                        );
                    };
                };
                for (var i = 0; i < ttq.methods.length; i++) {
                    ttq.setAndDefer(ttq, ttq.methods[i]);
                }
                ttq.load = function (e) {
                    var r = "https://analytics.tiktok.com/i18n/pixel/events.js";
                    var o = document.createElement("script");
                    o.type = "text/javascript";
                    o.async = true;
                    o.src = r + "?sdkid=" + e + "&lib=" + t;
                    var a = document.getElementsByTagName("script")[0];
                    a.parentNode.insertBefore(o, a);
                };
                // load - agregamos nuestro pixel de tiktok
                ttq.load("");
                ttq.page();
            })(window, document, "ttq");
        </script>

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --yellow: #f4c400;
                --blue: #003087;
                --red: #be0028;
                --bg: #fafaf8;
            }

            html {
                font-size: 16px;
            }

            body {
                min-height: 100vh;
                background: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "DM Sans", sans-serif;
            }

            /* ── OVERLAY ── */
            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.72);
                backdrop-filter: blur(6px);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 999;
                padding: clamp(12px, 4vw, 32px);
                animation: fadeIn 0.35s ease;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            /* ── POPUP ── */
            .popup {
                width: 100%;
                max-width: 420px;
                background: var(--bg);
                border-radius: clamp(14px, 3vw, 20px);
                overflow: hidden;
                box-shadow: 0 40px 100px rgba(0, 0, 0, 0.55);
                animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
                /* allow scroll on very small screens */
                max-height: calc(100dvh - 24px);
                overflow-y: auto;
                overscroll-behavior: contain;
            }

            @keyframes slideUp {
                from {
                    transform: translateY(36px) scale(0.97);
                    opacity: 0;
                }
                to {
                    transform: translateY(0) scale(1);
                    opacity: 1;
                }
            }

            /* ── FLAG BAND ── */
            .flag-band {
                display: flex;
                height: clamp(4px, 1vw, 6px);
                flex-shrink: 0;
            }
            .flag-band div:nth-child(1) {
                flex: 2;
                background: var(--yellow);
            }
            .flag-band div:nth-child(2) {
                flex: 1;
                background: var(--blue);
            }
            .flag-band div:nth-child(3) {
                flex: 1;
                background: var(--red);
            }

            /* ── HEADER ── */
            .header {
                background: #eeeeee;
                padding: clamp(18px, 4vw, 30px) clamp(16px, 5vw, 28px)
                    clamp(16px, 3.5vw, 26px);
                text-align: center;
            }

            .limited-tag {
                display: inline-block;
                background: var(--red);
                color: #fff;
                font-size: clamp(9px, 2vw, 10px);
                font-weight: 600;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                padding: 3px 10px;
                border-radius: 4px;
                margin-bottom: clamp(10px, 2.5vw, 14px);
            }

            .icon-wrap {
                width: clamp(42px, 10vw, 56px);
                height: clamp(42px, 10vw, 56px);
                background: var(--yellow);
                border-radius: clamp(10px, 2.5vw, 14px);
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto clamp(10px, 2.5vw, 16px);
            }

            .icon-wrap svg {
                width: clamp(20px, 5vw, 28px);
                height: clamp(20px, 5vw, 28px);
            }

            .header h1 {
                font-family: "Playfair Display", serif;
                font-size: clamp(20px, 5.5vw, 26px);
                font-weight: 900;
                color: #111;
                letter-spacing: -0.3px;
                line-height: 1.2;
            }

            .header p {
                color: #111;
                font-size: clamp(11px, 2.8vw, 13px);
                font-weight: 500;
                margin-top: clamp(4px, 1vw, 6px);
                letter-spacing: 0.3px;
            }

            /* ── BODY ── */
            .body {
                padding: clamp(16px, 4vw, 24px) clamp(14px, 4.5vw, 26px);
            }

            /* ── DISCOUNT BOX ── */
            .discount-box {
                display: flex;
                align-items: center;
                background: var(--blue);
                border-radius: clamp(10px, 2.5vw, 14px);
                padding: clamp(14px, 3.5vw, 18px) clamp(14px, 4vw, 22px);
                margin-bottom: clamp(14px, 3.5vw, 20px);
                gap: clamp(12px, 3vw, 18px);
            }

            .discount-num {
                font-family: "Playfair Display", serif;
                font-size: clamp(40px, 12vw, 58px);
                font-weight: 900;
                color: var(--yellow);
                line-height: 1;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .discount-info {
                border-left: 2px solid #fff;
                padding-left: clamp(12px, 3vw, 18px);
                min-width: 0;
            }

            .discount-info .title {
                font-size: clamp(12px, 3vw, 14px);
                font-weight: 600;
                color: #fff;
                margin-bottom: 4px;
            }

            .discount-info .sub {
                font-size: clamp(11px, 2.5vw, 12px);
                color: #eee;
                line-height: 1.5;
            }

            #sec {
                color: red;
            }

            /* ── TRUST ROW ── */
            .trust-row {
                display: flex;
                justify-content: space-between;
                margin-bottom: clamp(14px, 3.5vw, 20px);
                gap: clamp(6px, 1.5vw, 8px);
            }

            .trust-item {
                flex: 1;
                background: #fff;
                border: 1px solid #e8e8e4;
                border-radius: clamp(8px, 2vw, 10px);
                padding: clamp(8px, 2vw, 10px) clamp(6px, 1.5vw, 8px);
                text-align: center;
            }

            .trust-item svg {
                display: block;
                margin: 0 auto clamp(3px, 1vw, 5px);
                width: clamp(14px, 4vw, 18px);
                height: clamp(14px, 4vw, 18px);
            }

            .trust-item .t-label {
                font-size: clamp(9px, 2.2vw, 10px);
                font-weight: 600;
                color: #444;
                line-height: 1.3;
            }

            /* ── TIMER ── */
            .timer-label {
                font-size: clamp(10px, 2.5vw, 11px);
                font-weight: 600;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                color: #999;
                text-align: center;
                margin-bottom: clamp(8px, 2vw, 10px);
            }

            .timer-row {
                display: flex;
                justify-content: center;
                gap: clamp(6px, 2vw, 8px);
                margin-bottom: clamp(16px, 4vw, 22px);
            }

            .timer-block {
                background: #eee;
                border-radius: clamp(8px, 2vw, 10px);
                padding: clamp(8px, 2vw, 10px) clamp(10px, 3vw, 16px);
                text-align: center;
                min-width: clamp(52px, 14vw, 62px);
            }

            .timer-block .num {
                font-family: "Playfair Display", serif;
                font-size: clamp(22px, 6vw, 28px);
                font-weight: 700;
                line-height: 1;
                color: var(--yellow);
            }

            .timer-block .lbl {
                font-size: clamp(8px, 2vw, 9px);
                letter-spacing: 1px;
                color: #555;
                text-transform: uppercase;
                margin-top: 2px;
            }

            /* ── CTA ── */
            .cta-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: clamp(7px, 2vw, 10px);
                width: 100%;
                padding: clamp(14px, 3.5vw, 17px);
                background: var(--red);
                color: #fff;
                font-family: "DM Sans", sans-serif;
                font-size: clamp(13px, 3.5vw, 15px);
                font-weight: 700;
                letter-spacing: 0.5px;
                border: none;
                border-radius: clamp(10px, 2.5vw, 12px);
                cursor: pointer;
                margin-bottom: clamp(10px, 2.5vw, 12px);
                animation: ctaPulse 1.8s ease-in-out infinite;
                transform-origin: center;
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }

            .cta-btn svg {
                width: clamp(14px, 3.5vw, 16px);
                height: clamp(14px, 3.5vw, 16px);
                flex-shrink: 0;
            }

            @keyframes ctaPulse {
                0% {
                    transform: scale(1);
                    box-shadow: 0 4px 18px rgba(190, 0, 40, 0.35);
                }
                50% {
                    transform: scale(1.035);
                    box-shadow: 0 10px 32px rgba(190, 0, 40, 0.55);
                }
                100% {
                    transform: scale(1);
                    box-shadow: 0 4px 18px rgba(190, 0, 40, 0.35);
                }
            }

            .cta-btn:hover {
                background: #a0001f;
            }
            .cta-btn:active {
                transform: scale(0.97);
                animation: none;
            }

            /* ── CLOSE ── */
            .close-link {
                display: block;
                text-align: center;
                font-size: clamp(11px, 2.8vw, 12px);
                color: #bbb;
                cursor: pointer;
                padding-bottom: 2px;
                border-bottom: 1px solid transparent;
                width: fit-content;
                margin: 0 auto;
                transition:
                    color 0.2s,
                    border-color 0.2s;
                -webkit-tap-highlight-color: transparent;
            }

            .close-link:hover {
                color: #555;
                border-color: #ccc;
            }

            /* ── SECURE NOTE ── */
            .secure-note {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
                font-size: clamp(10px, 2.5vw, 11px);
                color: #bbb;
                margin-top: clamp(12px, 3vw, 14px);
                padding-top: clamp(12px, 3vw, 14px);
                border-top: 1px solid #e8e8e4;
            }

            /* ── LANDSCAPE PHONES ── */
            @media (max-height: 500px) and (orientation: landscape) {
                .popup {
                    max-height: calc(100dvh - 16px);
                }
                .header {
                    padding: 12px 20px 10px;
                }
                .icon-wrap {
                    width: 36px;
                    height: 36px;
                    margin-bottom: 8px;
                }
                .header h1 {
                    font-size: 18px;
                }
                .discount-box {
                    padding: 10px 16px;
                    margin-bottom: 12px;
                }
                .discount-num {
                    font-size: 36px;
                }
                .trust-row {
                    margin-bottom: 12px;
                }
                .timer-row {
                    margin-bottom: 14px;
                }
            }

            /* ── VERY SMALL PHONES (< 360px) ── */
            @media (max-width: 359px) {
                .discount-num {
                    font-size: 36px;
                }
                .discount-info .title {
                    font-size: 11px;
                }
                .timer-block {
                    min-width: 46px;
                    padding: 8px 8px;
                }
            }
        </style>
    </head>
    <body>
        <div class="overlay" id="overlay">
            <div class="popup">
                <div class="flag-band">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>

                <div class="header">
                    <div class="limited-tag">Oferta exclusiva · Hoy</div>
                    <div class="icon-wrap">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#111"
                            stroke-width="2.2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
                            />
                            <line x1="7" y1="7" x2="7.01" y2="7" />
                        </svg>
                    </div>
                    <h1>Promoción Colombia</h1>
                    <p>Descuento reservado para clientes seleccionados</p>
                </div>

                <div class="body">
                    <div class="discount-box">
                        <div class="discount-num">50%</div>
                        <div class="discount-info">
                            <div class="title">Descuento en tu compra</div>
                            <div class="sub">
                                Envío sin costo incluido<br />Válido solo hoy
                            </div>
                        </div>
                    </div>

                    <div class="trust-row">
                        <div class="trust-item">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="#BE0028"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                                />
                            </svg>
                            <div class="t-label">Pago<br />Seguro</div>
                        </div>
                        <div class="trust-item">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="#003087"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <rect x="1" y="3" width="15" height="13" />
                                <polygon
                                    points="16 8 20 8 23 11 23 16 16 16 16 8"
                                />
                                <circle cx="5.5" cy="18.5" r="2.5" />
                                <circle cx="18.5" cy="18.5" r="2.5" />
                            </svg>
                            <div class="t-label">Envío<br />Rápido</div>
                        </div>
                        <div class="trust-item">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="#F4C400"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <polygon
                                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                                />
                            </svg>
                            <div class="t-label">4.9 / 5<br />Calificación</div>
                        </div>
                    </div>

                    <div class="timer-label">La oferta expira en</div>
                    <div class="timer-row">
                        <div class="timer-block">
                            <div class="num" id="hrs">02</div>
                            <div class="lbl">Horas</div>
                        </div>
                        <div class="timer-block">
                            <div class="num" id="min">59</div>
                            <div class="lbl">Min</div>
                        </div>
                        <div class="timer-block">
                            <div class="num" id="sec">59</div>
                            <div class="lbl">Seg</div>
                        </div>
                    </div>

                    <button class="cta-btn" onclick="redirectToOffer()">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#fff"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polyline points="20 12 20 22 4 22 4 12" />
                            <rect x="2" y="7" width="20" height="5" />
                            <path d="M12 22V7" />
                            <path
                                d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"
                            />
                            <path
                                d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"
                            />
                        </svg>
                        Ver mi descuento exclusivo
                    </button>

                    <div class="secure-note">
                        <svg
                            width="12"
                            height="12"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#bbb"
                            stroke-width="2"
                        >
                            <rect
                                x="3"
                                y="11"
                                width="18"
                                height="11"
                                rx="2"
                                ry="2"
                            />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        Compra protegida · Sin compromisos
                    </div>
                </div>
            </div>
        </div>

        <script>
            let total = 2 * 3600 + 59 * 60 + 59;
            const h = document.getElementById("hrs");
            const m = document.getElementById("min");
            const s = document.getElementById("sec");

            setInterval(() => {
                if (total <= 0) return;
                total--;
                h.textContent = String(Math.floor(total / 3600)).padStart(
                    2,
                    "0",
                );
                m.textContent = String(
                    Math.floor((total % 3600) / 60),
                ).padStart(2, "0");
                s.textContent = String(total % 60).padStart(2, "0");
            }, 1000);

            // url al destino a redirigir
            const offerUrl = "https://innokomarket.com";

            function redirectToOffer() {
                // Opcional: trackear clic en TikTok
                if (typeof ttq !== "undefined") {
                    ttq.track("ClickButton");
                }
                window.location.href = offerUrl;
            }
        </script>
    </body>
</html>
