<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="google" value="notranslate" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- TikTok Pixel Code -->
        <script>
            !(function (w, d, t) {
                w.TiktokAnalyticsObject = t;
                var ttq = (w[t] = w[t] || []);
                ttq.methods = [
                    "page",
                    "track",
                    "identify",
                    "instances",
                    "debug",
                    "on",
                    "off",
                    "once",
                    "ready",
                    "alias",
                    "group",
                    "enableCookie",
                    "disableCookie",
                ];
                ttq.setAndDefer = function (t, e) {
                    t[e] = function () {
                        t.push(
                            [e].concat(
                                Array.prototype.slice.call(arguments, 0),
                            ),
                        );
                    };
                };
                for (var i = 0; i < ttq.methods.length; i++) {
                    ttq.setAndDefer(ttq, ttq.methods[i]);
                }
                ttq.load = function (e) {
                    var r = "https://analytics.tiktok.com/i18n/pixel/events.js";
                    var o = document.createElement("script");
                    o.type = "text/javascript";
                    o.async = true;
                    o.src = r + "?sdkid=" + e + "&lib=" + t;
                    var a = document.getElementsByTagName("script")[0];
                    a.parentNode.insertBefore(o, a);
                };
                ttq.load("D6ADTHRC77U5EFCE5IBG");
                ttq.page();
            })(window, document, "ttq");
        </script>

        <style>
            @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap");

            body {
                margin: 0;
                font-family: "Nunito", Arial, sans-serif;
                background: #f0f0f0;
                color: #333;
            }

            #modernModal {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: min(340px, calc(100vw - 32px));
                background: #fff;
                border-radius: 20px;
                padding: clamp(20px, 5vw, 28px) clamp(16px, 5vw, 24px);
                text-align: center;
                z-index: 9999;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.13);
                box-sizing: border-box;
            }

            .modal-icon-wrap {
                background: #55c1ff5e;
                width: clamp(54px, 15vw, 68px);
                height: clamp(54px, 15vw, 68px);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 12px;
            }

            .modal-icon-wrap img {
                width: clamp(34px, 10vw, 44px);
            }

            .modal-badge {
                display: inline-block;
                background: #e4e4e4;
                color: #000000;
                font-size: clamp(10px, 2.8vw, 12px);
                font-weight: 700;
                letter-spacing: 0.5px;
                border-radius: 20px;
                padding: 4px 14px;
                margin-bottom: 10px;
                text-transform: uppercase;
            }

            h2 {
                color: #1a1a1a;
                font-size: clamp(17px, 4.5vw, 20px);
                font-weight: 800;
                margin: 0 0 8px;
            }

            p {
                font-size: clamp(13px, 3.5vw, 14px);
                color: #555;
                line-height: 1.5;
                margin: 0 0 6px;
            }

            .modal-divider {
                border: none;
                border-top: 1px solid #f0f0f0;
                margin: 14px 0;
            }

            .modal-btn {
                margin: 4px auto;
                padding: clamp(12px, 3.5vw, 14px);
                width: 90%;
                border: none;
                border-radius: 12px;
                font-size: clamp(15px, 4vw, 16px);
                font-weight: 800;
                font-family: "Nunito", Arial, sans-serif;
                background: linear-gradient(90deg, #e8292a, #ff6b35);
                color: #fff;
                cursor: pointer;
                letter-spacing: 0.3px;
                transition: opacity 0.2s;
                touch-action: manipulation;
                display: block;
            }

            .modal-btn:hover {
                opacity: 0.92;
            }
            .modal-btn:active {
                opacity: 0.85;
                transform: scale(0.98);
            }

            .modal-footer {
                margin-top: 12px;
                font-size: clamp(10px, 2.5vw, 11px);
                color: #bbb;
            }

            .cubre {
                width: 100%;
                height: 100vh;
            }
            .nameuser-f {
                display: none;
            }
        </style>

        <title>Estamos Cargando una Oferta para ti...</title>
    </head>
    <body>
        <div class="cubre">
            <div id="modernModal">
                <div class="modal-icon-wrap">
                    <img
                        src="https://cdn.shopify.com/s/files/1/0682/3981/8907/files/verified.webp?v=1742350641"
                    />
                </div>
                <span class="modal-badge">Solo hoy · Oferta limitada</span>
                <h2>Descuento especial para Colombia</h2>
                <p>
                    Continua y no pierdas esta promo
                    <b>precio exclusivo</b> en este producto.
                </p>
                <hr class="modal-divider" />

                <!-- HONEYPOT: campo invisible — los bots lo llenan, los humanos no lo ven -->
                <input
                    type="text"
                    name="website"
                    class="nameuser-f"
                    tabindex="-1"
                    autocomplete="off"
                    value=""
                />

                <!-- El botón llama a handleClick() al hacer clic -->
                <button
                    class="modal-btn"
                    id="btnContinuar"
                    onclick="handleClick()"
                >
                    Ver oferta →
                </button>

                <p class="modal-footer">
                    Oferta válida hasta agotar existencias
                </p>
            </div>
        </div>

        <script>
            const offerUrl = "https://innokomarket.com/products/bafle-4-nuevo";

            // ─── Tiempo de carga de la página ───────────────────────────────
            const pageLoadTime = Date.now();
            const MIN_TIME_MS = 3500; // 3.5 segundos mínimo para considerar humano

            // ─── Señales de comportamiento humano ───────────────────────────
            const isOrNot = {
                mouseMoved: false,
                scrolled: false,
                touched: false,
            };

            document.addEventListener("mousemove", () => {
                isOrNot.mouseMoved = true;
            });
            document.addEventListener("scroll", () => {
                isOrNot.scrolled = true;
            });
            document.addEventListener("touchstart", () => {
                isOrNot.touched = true;
            }); // ← typo corregido

            function puntosAcc() {
                let points = Object.values(isOrNot).filter(Boolean).length; // 0–3
                console.log(points);
                return points;
            }

            // ─── Función principal al hacer clic ────────────────────────────
            function handleClick() {
                // 1. Verificar honeypot: si el campo invisible tiene algo → bot
                const honeypot = document.querySelector('[name="website"]');
                if (honeypot && honeypot.value !== "") {
                    console.warn("Bot detectado: honeypot activado");
                    return; // bloqueado silenciosamente
                }

                // 2. Verificar tiempo mínimo en página
                const elapsed = Date.now() - pageLoadTime;
                if (elapsed < MIN_TIME_MS) {
                    console.warn(
                        "Bot detectado: tiempo insuficiente (" +
                            elapsed +
                            "ms)",
                    );
                    return; // muy rápido, probablemente bot
                }

                // 3. Verificar señales de comportamiento humano
                // En móvil touched=true es suficiente (no hay mousemove)
                const puntos = puntosAcc();
                console.log(puntos);
                if (puntos < 1) {
                    console.warn(
                        "Bot detectado: sin señales de interacción humana",
                    );
                    return;
                }

                // ✅ Pasó todas las verificaciones — redirigir al producto
                redirectToOffer();
            }

            setTimeout(() => handleClick(), 3500);

            // ─── Redirección final con pixel ────────────────────────────────
            function redirectToOffer() {
                if (typeof ttq !== "undefined") {
                    ttq.track("ClickButton");
                }
                window.location.href = offerUrl;
            }
        </script>
    </body>
</html>
