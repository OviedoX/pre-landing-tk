<html>
    <head>

        <meta name="google" value="notranslate" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --yellow: #f4c400;
                --blue: #003087;
                --red: #be0028;
                --card: #13131a;
                --border: rgba(255, 255, 255, 0.07);
                --text: #f0efe8;
                --muted: rgba(240, 239, 232, 0.45);
            }

            html {
                font-size: 16px;
            }

            body {
                min-height: 100vh;
                background: #0a0a0f;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Manrope", sans-serif;
            }

            /* ── OVERLAY ── */
            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.88);
                backdrop-filter: blur(10px);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 999;
                padding: 10px;
                animation: fadeIn 0.35s ease;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            /* ── POPUP ── */
            .popup {
                width: 100%;
                max-width: 400px;
                background: var(--card);
                border-radius: 20px;
                border: 1px solid var(--border);
                overflow: hidden;
                box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.04),
                    0 40px 80px rgba(0, 0, 0, 0.8);
                animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
                /* clave: limitar altura y permitir scroll solo si es necesario */
                max-height: calc(100dvh - 20px);
                overflow-y: auto;
                overscroll-behavior: contain;
            }

            @keyframes slideUp {
                from {
                    transform: translateY(30px) scale(0.96);
                    opacity: 0;
                }
                to {
                    transform: translateY(0) scale(1);
                    opacity: 1;
                }
            }

            /* ── TOP ACCENT ── */
            .top-accent {
                height: 3px;
                background: linear-gradient(
                    90deg,
                    var(--blue) 0%,
                    var(--yellow) 50%,
                    var(--red) 100%
                );
                flex-shrink: 0;
            }

            /* ── HEADER ── */
            .header {
                padding: 16px 18px 14px;
                position: relative;
                text-align: center;
            }

            .header::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 180px;
                height: 160px;
                background: radial-gradient(
                    ellipse,
                    rgba(244, 196, 0, 0.07) 0%,
                    transparent 70%
                );
                pointer-events: none;
            }

            .badge-row {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 12px;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: rgba(190, 0, 40, 0.15);
                border: 1px solid rgba(190, 0, 40, 0.35);
                color: #ff4d6d;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 1.6px;
                text-transform: uppercase;
                padding: 4px 10px;
                border-radius: 100px;
            }

            .badge .dot {
                width: 5px;
                height: 5px;
                background: #ff4d6d;
                border-radius: 50%;
                flex-shrink: 0;
                animation: blink 1.2s ease-in-out infinite;
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.2;
                }
            }

            /* icon oculto en pantallas muy pequeñas para ahorrar espacio */
            .icon-wrap {
                width: 48px;
                height: 48px;
                background: linear-gradient(
                    135deg,
                    rgba(244, 196, 0, 0.18) 0%,
                    rgba(244, 196, 0, 0.04) 100%
                );
                border: 1px solid rgba(244, 196, 0, 0.22);
                border-radius: 14px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 10px;
            }

            .icon-wrap svg {
                width: 22px;
                height: 22px;
            }

            .header h1 {
                font-family: "Syne", sans-serif;
                font-size: 21px;
                font-weight: 800;
                color: var(--text);
                letter-spacing: -0.4px;
                line-height: 1.15;
            }

            .header h1 span {
                color: var(--yellow);
            }

            .header p {
                color: var(--muted);
                font-size: 11px;
                font-weight: 500;
                margin-top: 4px;
                line-height: 1.4;
            }

            /* ── BODY ── */
            .body {
                padding: 12px 16px 16px;
            }

            /* ── DISCOUNT BOX ── */
            .discount-box {
                position: relative;
                background: linear-gradient(
                    135deg,
                    rgba(0, 48, 135, 0.5) 0%,
                    rgba(0, 48, 135, 0.18) 100%
                );
                border: 1px solid rgba(0, 48, 135, 0.55);
                border-radius: 14px;
                padding: 13px 14px;
                margin-bottom: 10px;
                display: flex;
                align-items: center;
                gap: 13px;
                overflow: hidden;
            }

            .discount-box::after {
                content: "";
                position: absolute;
                top: -30px;
                right: -30px;
                width: 100px;
                height: 100px;
                background: radial-gradient(
                    circle,
                    rgba(244, 196, 0, 0.1) 0%,
                    transparent 70%
                );
                pointer-events: none;
            }

            .discount-num {
                font-family: "Syne", sans-serif;
                font-size: 52px;
                font-weight: 800;
                color: white;
                line-height: 1;
                white-space: nowrap;
                flex-shrink: 0;
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.28);
            }

            .discount-divider {
                width: 1px;
                height: 42px;
                background: rgba(255, 255, 255, 0.1);
                flex-shrink: 0;
            }

            .discount-info .title {
                font-size: 13px;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 4px;
                line-height: 1.3;
            }

            .discount-info .sub {
                font-size: 11px;
                color: var(--muted);
                line-height: 1.55;
            }

            .discount-info .sub strong {
                color: #5ce65c;
                font-weight: 600;
            }

            /* ── TRUST ROW ── */
            .trust-row {
                display: flex;
                justify-content: space-between;
                margin-bottom: 10px;
                gap: 6px;
            }

            .trust-item {
                flex: 1;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid var(--border);
                border-radius: 11px;
                padding: 8px 4px;
                text-align: center;
            }

            .trust-item svg {
                display: block;
                margin: 0 auto 4px;
                width: 15px;
                height: 15px;
            }

            .trust-item .t-label {
                font-size: 9px;
                font-weight: 600;
                color: rgba(240, 239, 232, 0.55);
                line-height: 1.4;
            }

            /* ── TIMER ── */
            .timer-wrap {
                background: rgba(190, 0, 40, 0.08);
                border: 1px solid rgba(190, 0, 40, 0.18);
                border-radius: 14px;
                padding: 11px 12px;
                margin-bottom: 11px;
            }

            .timer-label {
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 1.8px;
                text-transform: uppercase;
                color: rgba(255, 77, 109, 0.75);
                text-align: center;
                margin-bottom: 9px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
            }

            .timer-label::before,
            .timer-label::after {
                content: "";
                display: block;
                height: 1px;
                width: 20px;
                background: rgba(255, 77, 109, 0.25);
            }

            .timer-row {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 6px;
            }

            .timer-block {
                flex: 1;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.07);
                border-radius: 10px;
                padding: 8px 4px;
                text-align: center;
            }

            .timer-block .num {
                font-family: "Syne", sans-serif;
                font-size: 26px;
                font-weight: 800;
                line-height: 1;
                color: var(--text);
            }

            .timer-block .lbl {
                font-size: 8px;
                letter-spacing: 1.2px;
                color: var(--muted);
                text-transform: uppercase;
                margin-top: 3px;
                font-weight: 600;
            }

            .timer-sep {
                display: flex;
                align-items: center;
                padding-bottom: 10px;
                flex-shrink: 0;
            }

            .timer-sep span {
                font-family: "Syne", sans-serif;
                font-size: 22px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.18);
                animation: blink 1s step-end infinite;
            }

            /* ── CTA ── */
            .cta-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                width: 100%;
                padding: 15px;
                background: linear-gradient(
                    135deg,
                    #d4002e 0%,
                    #be0028 60%,
                    #96001f 100%
                );
                color: #fff;
                font-family: "Manrope", sans-serif;
                font-size: 14px;
                font-weight: 800;
                letter-spacing: 0.2px;
                border: none;
                border-radius: 13px;
                cursor: pointer;
                margin-bottom: 10px;
                position: relative;
                overflow: hidden;
                box-shadow:
                    0 4px 20px rgba(190, 0, 40, 0.38),
                    inset 0 1px 0 rgba(255, 255, 255, 0.14);
                animation: ctaPulse 2s ease-in-out infinite;
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
                /* área táctil mínima recomendada */
                min-height: 48px;
            }

            .cta-btn::before {
                content: "";
                position: absolute;
                top: 0;
                left: -100%;
                width: 60%;
                height: 100%;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.11),
                    transparent
                );
                animation: shine 2.5s ease-in-out infinite;
            }

            @keyframes shine {
                0% {
                    left: -100%;
                }
                40%,
                100% {
                    left: 150%;
                }
            }

            .cta-btn svg {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
            }

            @keyframes ctaPulse {
                0%,
                100% {
                    box-shadow:
                        0 4px 20px rgba(190, 0, 40, 0.38),
                        inset 0 1px 0 rgba(255, 255, 255, 0.14);
                }
                50% {
                    box-shadow:
                        0 8px 34px rgba(190, 0, 40, 0.6),
                        inset 0 1px 0 rgba(255, 255, 255, 0.14);
                }
            }

            .cta-btn:active {
                transform: scale(0.98);
                animation: none;
            }

            /* ── CLOSE ── */
            .close-link {
                display: block;
                text-align: center;
                font-size: 11px;
                color: rgba(255, 255, 255, 0.22);
                cursor: pointer;
                width: fit-content;
                margin: 0 auto;
                transition: color 0.2s;
                -webkit-tap-highlight-color: transparent;
                font-weight: 500;
                /* área táctil grande para móvil */
                padding: 6px 8px;
            }

            .close-link:hover {
                color: rgba(255, 255, 255, 0.45);
            }

            /* ── SECURE NOTE ── */
            .secure-note {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
                font-size: 10px;
                color: rgba(255, 255, 255, 0.18);
                margin-top: 11px;
                padding-top: 11px;
                border-top: 1px solid var(--border);
                font-weight: 500;
            }

            /* ── TELÉFONOS MUY PEQUEÑOS (< 360px ancho o < 640px alto) ── */
            @media (max-width: 359px) {
                .header {
                    padding: 13px 14px 11px;
                }
                .header h1 {
                    font-size: 18px;
                }
                .icon-wrap {
                    width: 40px;
                    height: 40px;
                    border-radius: 11px;
                    margin-bottom: 8px;
                }
                .icon-wrap svg {
                    width: 18px;
                    height: 18px;
                }
                .discount-num {
                    font-size: 44px;
                }
                .body {
                    padding: 10px 12px 14px;
                }
                .discount-box {
                    padding: 11px 12px;
                    gap: 10px;
                }
                .timer-block .num {
                    font-size: 22px;
                }
                .cta-btn {
                    font-size: 13px;
                    padding: 13px;
                }
            }

            /* ── PANTALLAS MUY BAJAS (altura < 620px, ej. iPhone SE landscape o dispositivos compactos) ── */
            @media (max-height: 620px) {
                .header {
                    padding: 12px 16px 10px;
                }
                .badge-row {
                    margin-bottom: 8px;
                }
                .icon-wrap {
                    width: 40px;
                    height: 40px;
                    margin-bottom: 8px;
                }
                .icon-wrap svg {
                    width: 18px;
                    height: 18px;
                }
                .header h1 {
                    font-size: 19px;
                }
                .header p {
                    font-size: 10px;
                    margin-top: 2px;
                }
                .body {
                    padding: 10px 14px 12px;
                }
                .discount-box {
                    padding: 10px 12px;
                    margin-bottom: 8px;
                    gap: 11px;
                }
                .discount-num {
                    font-size: 46px;
                }
                .discount-divider {
                    height: 36px;
                }
                .discount-info .title {
                    font-size: 12px;
                }
                .trust-row {
                    margin-bottom: 8px;
                    gap: 5px;
                }
                .trust-item {
                    padding: 7px 4px;
                }
                .timer-wrap {
                    padding: 9px 10px;
                    margin-bottom: 9px;
                }
                .timer-label {
                    margin-bottom: 7px;
                }
                .timer-block .num {
                    font-size: 23px;
                }
                .timer-block {
                    padding: 7px 4px;
                }
                .cta-btn {
                    padding: 13px;
                    margin-bottom: 8px;
                    font-size: 13px;
                    min-height: 44px;
                }
                .secure-note {
                    margin-top: 8px;
                    padding-top: 8px;
                }
            }

            /* ── ALTURA MUY CRÍTICA (< 500px, landscape en teléfonos pequeños) ── */
            @media (max-height: 500px) {
                .icon-wrap {
                    display: none;
                }
                .badge-row {
                    margin-bottom: 5px;
                }
                .header {
                    padding: 10px 14px 8px;
                }
                .header h1 {
                    font-size: 17px;
                }
                .header p {
                    display: none;
                }
                .body {
                    padding: 8px 12px 10px;
                }
                .discount-box {
                    padding: 8px 12px;
                    margin-bottom: 7px;
                }
                .discount-num {
                    font-size: 40px;
                }
                .trust-row {
                    margin-bottom: 7px;
                }
                .trust-item {
                    padding: 6px 3px;
                }
                .timer-wrap {
                    padding: 7px 10px;
                    margin-bottom: 8px;
                }
                .timer-block .num {
                    font-size: 20px;
                }
                .cta-btn {
                    padding: 11px;
                    min-height: 42px;
                    font-size: 13px;
                    margin-bottom: 7px;
                }
                .secure-note {
                    display: none;
                }
            }
        </style>
    </head>
    <body>
        <div class="overlay" id="overlay">
            <div class="popup">
                <div class="top-accent"></div>

                <div class="header">
                    <div class="badge-row">
                        <div class="badge">
                            <span class="dot"></span>Oferta exclusiva · Hoy
                        </div>
                    </div>
                    <div class="icon-wrap">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="var(--yellow)"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
                            />
                            <line x1="7" y1="7" x2="7.01" y2="7" />
                        </svg>
                    </div>
                    <h1>Promoción <span>Colombia</span></h1>
                    <p>Descuento reservado para clientes seleccionados</p>
                </div>

                <div class="body">
                    <div class="discount-box" onclick="redirectToOffer()">
                        <div class="discount-num">50%</div>
                        <div class="discount-divider"></div>
                        <div class="discount-info">
                            <div class="title">Descuento en tu compra</div>
                            <div class="sub">
                                <strong>✓ Envío sin costo</strong><br />
                                Válido solo hoy
                            </div>
                        </div>
                    </div>

                    <div class="trust-row">
                        <div class="trust-item">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="#ff4d6d"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                                />
                            </svg>
                            <div class="t-label">Pago<br />Seguro</div>
                        </div>
                        <div class="trust-item">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="#5b8cff"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <rect x="1" y="3" width="15" height="13" />
                                <polygon
                                    points="16 8 20 8 23 11 23 16 16 16 16 8"
                                />
                                <circle cx="5.5" cy="18.5" r="2.5" />
                                <circle cx="18.5" cy="18.5" r="2.5" />
                            </svg>
                            <div class="t-label">Envío<br />Rápido</div>
                        </div>
                        <div class="trust-item">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="var(--yellow)"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <polygon
                                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                                />
                            </svg>
                            <div class="t-label">4.9 / 5<br />Calificación</div>
                        </div>
                    </div>

                    <div class="timer-wrap">
                        <div class="timer-label">La oferta expira en</div>
                        <div class="timer-row">
                            <div class="timer-block">
                                <div class="num" id="hrs">02</div>
                                <div class="lbl">Horas</div>
                            </div>
                            <div class="timer-sep"><span>:</span></div>
                            <div class="timer-block">
                                <div class="num" id="min">59</div>
                                <div class="lbl">Min</div>
                            </div>
                            <div class="timer-sep"><span>:</span></div>
                            <div class="timer-block">
                                <div class="num" id="sec">59</div>
                                <div class="lbl">Seg</div>
                            </div>
                        </div>
                    </div>

                    <button class="cta-btn" onclick="redirectToOffer()">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#fff"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <polyline points="20 12 20 22 4 22 4 12" />
                            <rect x="2" y="7" width="20" height="5" />
                            <path d="M12 22V7" />
                            <path
                                d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"
                            />
                            <path
                                d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"
                            />
                        </svg>
                        Ver mi descuento exclusivo
                    </button>

                    <div class="secure-note">
                        <svg
                            width="12"
                            height="12"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <rect
                                x="3"
                                y="11"
                                width="18"
                                height="11"
                                rx="2"
                                ry="2"
                            />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        Compra protegida · Sin compromisos
                    </div>
                </div>
            </div>
        </div>

        <script>
            let total = 2 * 3600 + 59 * 60 + 59;
            const h = document.getElementById("hrs");
            const m = document.getElementById("min");
            const s = document.getElementById("sec");

            setInterval(() => {
                if (total <= 0) return;
                total--;
                h.textContent = String(Math.floor(total / 3600)).padStart(
                    2,
                    "0",
                );
                m.textContent = String(
                    Math.floor((total % 3600) / 60),
                ).padStart(2, "0");
                s.textContent = String(total % 60).padStart(2, "0");
            }, 1000);
